stages:
  - validate
  - build
  - test
  - docker_build
  - docker_push
  - deploy_dev
  - deploy_prod
  - post_deploy_validation

variables:
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "eks-devops-platform"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  KUBE_NAMESPACE: "platform-demo"

validate:
  stage: validate
  image: maven:3.9.8-eclipse-temurin-17
  script:
    - cd app
    - mvn -version
    - echo "Validating project structure"
  rules:
    - if: '$CI_COMMIT_BRANCH'

build:
  stage: build
  image: maven:3.9.8-eclipse-temurin-17
  script:
    - cd app
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - app/target/eks-devops-platform.jar
    expire_in: 1 day

test:
  stage: test
  image: maven:3.9.8-eclipse-temurin-17
  script:
    - cd app
    - mvn test

docker_build:
  stage: docker_build
  image: docker:25.0.3
  services:
    - docker:25.0.3-dind
  script:
    - docker build -t $ECR_REPOSITORY:$IMAGE_TAG -f app/Dockerfile app
    - docker save $ECR_REPOSITORY:$IMAGE_TAG > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 day

docker_push:
  stage: docker_push
  image: amazon/aws-cli:2.15.57
  services:
    - docker:25.0.3-dind
  before_script:
    - yum install -y docker
  script:
    - docker load < image.tar
    - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
    - ECR_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
    - docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
    - docker push $ECR_URI:$IMAGE_TAG
    - echo "IMAGE_URI=$ECR_URI:$IMAGE_TAG" > image.env
  artifacts:
    reports:
      dotenv: image.env

deploy_dev:
  stage: deploy_dev
  image: bitnami/kubectl:1.30
  script:
    - kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/deployment.yaml | kubectl apply -n $KUBE_NAMESPACE -f -
    - kubectl apply -n $KUBE_NAMESPACE -f k8s/configmap.yaml
    - kubectl apply -n $KUBE_NAMESPACE -f k8s/service.yaml
    - kubectl apply -n $KUBE_NAMESPACE -f k8s/ingress.yaml
    - kubectl rollout status deployment/eks-devops-platform -n $KUBE_NAMESPACE
  environment:
    name: dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy_prod:
  stage: deploy_prod
  image: bitnami/kubectl:1.30
  script:
    - sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/deployment.yaml | kubectl apply -n $KUBE_NAMESPACE -f -
    - kubectl rollout status deployment/eks-devops-platform -n $KUBE_NAMESPACE
  environment:
    name: production
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

post_deploy_validation:
  stage: post_deploy_validation
  image: curlimages/curl:8.8.0
  script:
    - echo "Validate service endpoint /health after deployment"
    - echo "Example: curl -f https://app.example.com/actuator/health"
  rules:
    - if: '$CI_COMMIT_BRANCH'
