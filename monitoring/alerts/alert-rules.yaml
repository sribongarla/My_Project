groups:
  - name: platform-demo-alerts
    rules:
      - alert: HighPodMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.75
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod memory usage above 75%"
          description: "Memory usage is high. Check for memory leak or tune resource limits."

      - alert: PodRestartingFrequently
        expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod restarting frequently"
          description: "Pod restarted more than 3 times in 10 minutes."

      - alert: PodPending
        expr: kube_pod_status_phase{phase="Pending"} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod is pending"
          description: "Pod could not be scheduled. Check node capacity, taints, or resource requests."
